# Supervisor config for live demo
supervisor:
  mesh_url: http://localhost:9090
  agent_id: demo-supervisor
  poll_interval: 2s
  confidence_threshold: 0.7

  tool_scopes:
    - "filesystem.*"

  project_dirs:
    - /tmp/supervisor-demo

  decision_log: demo-decisions.jsonl

  ollama:
    enabled: true
    url: http://localhost:11434
    model: qwen3:14b
    timeout: 30

  rules:
    # Fast path: writes within the demo directory → approve without LLM
    - name: demo-scope
      description: "Approve writes within demo directory"
      condition: "params.path starts_with /tmp/supervisor-demo"
      action: approve
      confidence: 0.95

    # Fast path: writes to system dirs → deny without LLM
    - name: deny-system
      description: "Deny writes to system directories"
      condition: "params.path starts_with /etc"
      action: deny
      confidence: 0.99

    # Everything else → Ollama evaluates (catch-all is auto-appended)
